<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notas — 1x10d</title>
<link rel="icon" type="image/png" href="assets/favicon-32.png" sizes="32x32" />
<link rel="icon" type="image/png" href="assets/favicon-16.png" sizes="16x16" />
<link rel="shortcut icon" href="assets/favicon.ico" />
<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/notes.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-checking">
<div class="crt-overlay"></div>
<div class="crt-vignette"></div>

<div id="site-header"></div>

<section class="page-hero">
  <div class="wrap">
    <div class="eyebrow">Canal 07</div>
    <h1>Notas</h1>
  </div>
</section>

<section class="page-body">
  <div class="wrap">
    <div class="notes-layout">

      <div class="panel notes-sidebar">
        <div class="notes-sidebar-head">
          <button class="btn btn-ghost" id="new-folder-btn">+ Carpeta</button>
          <button class="btn btn-primary" id="new-note-btn">+ Nota</button>
        </div>
        <div id="folder-tree"></div>
      </div>

      <div class="panel notes-editor">
        <div id="editor-empty" class="dim" style="padding:30px; text-align:center;">
          Selecciona una nota, o crea una nueva.
        </div>
        <div id="editor-form" class="hidden">
          <div class="editor-toolbar">
            <input id="note-title" placeholder="Título de la nota" />
            <select id="note-folder-select"></select>
            <button class="btn btn-ghost" id="delete-note-btn">Eliminar</button>
          </div>
          <textarea id="note-content" placeholder="Escribe aquí…"></textarea>
          <div class="editor-status dim" id="note-save-status"></div>
        </div>
      </div>

    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/notes.js"></script>
<script>mountChrome('notes');</script>
</body>
</html>
